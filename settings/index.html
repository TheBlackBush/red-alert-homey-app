<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    body { font-family: sans-serif; margin: 20px; max-width: 760px; }
    .row { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 8px 14px; border: 0; border-radius: 8px; cursor: pointer; }
    .hint { font-size: 12px; opacity: .7; }
  </style>
</head>
<body>
  <h2>Red Alert Settings</h2>
  <div class="row">
    <label><input type="checkbox" id="monitoring" /> Monitoring enabled</label>
  </div>
  <div class="row">
    <label>Selected city IDs (comma-separated)</label>
    <input id="cities" placeholder="3001, 500114" />
    <div class="hint">You can also use city names in Hebrew, comma-separated.</div>
  </div>
  <div class="row">
    <label>Quiet hours start/end (for pre-alerts only)</label>
    <div style="display:flex; gap:10px;">
      <input id="quietStart" type="number" min="0" max="23" placeholder="23" />
      <input id="quietEnd" type="number" min="0" max="23" placeholder="6" />
      <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="quietEnabled" />Enable</label>
    </div>
  </div>
  <div class="row">
    <label>Throttle by type (ms, JSON)</label>
    <textarea id="throttle" rows="4">{"primary":120000,"pre-alert":180000,"all-clear":120000,"other":120000,"test":0}</textarea>
  </div>
  <button id="save">Save</button>
  <div id="status" class="hint" style="margin-top:10px;"></div>

  <script>
    function parseList(v) {
      return String(v || '').split(',').map(x => x.trim()).filter(Boolean);
    }

    function getSetting(Homey, key, fallback, cb) {
      Homey.get(key, (err, value) => {
        if (err) return cb(fallback);
        if (value === null || value === undefined) return cb(fallback);
        cb(value);
      });
    }

    function setSetting(Homey, key, value) {
      return new Promise((resolve, reject) => {
        Homey.set(key, value, (err) => {
          if (err) return reject(err);
          resolve();
        });
      });
    }

    function onHomeyReady(Homey) {
      getSetting(Homey, 'monitoring_enabled', true, (monitoring) => {
        document.getElementById('monitoring').checked = monitoring !== false;
      });

      getSetting(Homey, 'selected_city_ids', [], (selectedCityIds) => {
        document.getElementById('cities').value = Array.isArray(selectedCityIds) ? selectedCityIds.join(', ') : '';
      });

      getSetting(Homey, 'quiet_hours', { enabled: false, start: 23, end: 6 }, (quietHours) => {
        document.getElementById('quietStart').value = quietHours.start;
        document.getElementById('quietEnd').value = quietHours.end;
        document.getElementById('quietEnabled').checked = !!quietHours.enabled;
      });

      getSetting(Homey, 'throttle_by_type_ms', { primary: 120000, 'pre-alert': 180000, 'all-clear': 120000, other: 120000, test: 0 }, (throttle) => {
        document.getElementById('throttle').value = JSON.stringify(throttle);
      });

      document.getElementById('save').addEventListener('click', async () => {
        try {
          await setSetting(Homey, 'monitoring_enabled', document.getElementById('monitoring').checked);
          await setSetting(Homey, 'selected_city_ids', parseList(document.getElementById('cities').value));
          await setSetting(Homey, 'quiet_hours', {
            enabled: document.getElementById('quietEnabled').checked,
            start: Number(document.getElementById('quietStart').value || 23),
            end: Number(document.getElementById('quietEnd').value || 6),
          });
          await setSetting(Homey, 'throttle_by_type_ms', JSON.parse(document.getElementById('throttle').value || '{}'));
          document.getElementById('status').innerText = 'Saved.';
        } catch (e) {
          document.getElementById('status').innerText = 'Save failed: ' + e.message;
        }
      });

      Homey.ready();
    }
  </script>
</body>
</html>
